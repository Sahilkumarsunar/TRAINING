<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Local storage</h1>
    <input type="text" id="color" placeholder="enter any color" />
    <button id="checkBtn">check</button>
    <div class="display"></div>
    <script>
      const display = document.querySelector(".display");
      const color = document.getElementById("color").value;
      const input = document.getElementById("color");
      const checkBtn = document.getElementById("checkBtn");
      input.addEventListener("input", () => {
        const color = document.getElementById("color").value;
        sessionStorage.setItem("userColor", color);
      });
      checkBtn.addEventListener("click", () => {
        if (sessionStorage.getItem("userColor")) {
          let userColor = localStorage.getItem("userColor");
          display.innerHTML = "the color is :" + userColor;
        } else display.innerHTML = "no color yet";
      });
    </script>
  </body>
</html>
