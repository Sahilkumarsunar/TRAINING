<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="sra.js" ></script>
    <link rel="stylesheet" href="sra.css">  <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    /></head>
<body>
    <div class="student-analyzer">
       <div class="card"> <div class="std-anlz-card">
            <center><h1>Student result analyzer</h1>
            <label >Student's index : </label>
            <input type="text"  placeholder="enter the student name" id="indexOfStudent"> 
            <button id="indexOfStudentBtn"><i class="fas fa-search"></i></button><br><br>
           
            <label >Student's index from last : </label>
            <input type="text"  placeholder="enter the student name" id="LastIndexOfStudent">
            <button id="LastIndexOfStudentBtn"><i class="fas fa-search"></i></button><br><br>
           
            <label>Is student  enrolled : </label>
            <input type="text"  placeholder="enter the student name" id="enrolled">
            <button id="enrolledBtn"><i class="fas fa-search"></i></button><br><br>
           
            <label >First passing marks : </label>
            <input type="text"  placeholder="enter the passing marks" id="findStdPass">
            <button id="findStdPassBtn"><i class="fas fa-search"></i></button><br><br>
           
            <label >Last student scoring above 50:</label>
            <button id="lastStdPassBtn"><i class="fas fa-search"></i></button><br><br>
        </center><br><br>
        </div>
        <div class="result">
        </div>
        </div>
    </div>
</body>
</html>
